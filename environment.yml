name: fastgc

channels:
  - conda-forge

dependencies:
  - python=3.10

  # Core numerical stack
  - numpy>=1.22
  - scipy>=1.9

  # Geospatial stack
  - rasterio>=1.3
  - gdal>=3.6
  - pyproj>=3.5
  - shapely>=2.0

  # Utilities
  - tqdm>=4.64
  - joblib>=1.3

  # Pip
  - pip

  - pip:
      - laspy>=2.4
      - lazrs>=0.6