name: fastgc

channels:
  - conda-forge

dependencies:
  - python=3.10

  # Core numerical stack
  - numpy>=1.22
  - scipy>=1.9

  # Core raster / IO
  - rasterio>=1.3

  # Optional geospatial stack (used in advanced workflows)
  - shapely>=2.0
  - pyproj>=3.5
  - gdal>=3.6

  # Utilities
  - tqdm>=4.64
  - joblib>=1.3
  - psutil>=5.9

  # Pip install for LAS handling
  - pip
  - pip:
      - laspy>=2.4
      - lazrs>=0.6