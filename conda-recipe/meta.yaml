{% set name = "fastgc" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"
  entry_points:
    - fastgc=fastgc.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
    - setuptools-scm
  run:
    - python >=3.10
    - numpy >=1.22,<2.0
    - scipy >=1.9,<1.14
    - rasterio >=1.3
    - fiona >=1.9
    - shapely >=2.0
    - laspy >=2.4
    - lazrs >=0.6
    - tqdm >=4.64
    - joblib >=1.3
    - psutil >=5.9

test:
  imports:
    - fastgc
  commands:
    - fastgc --help

about:
  home: https://github.com/nadeemfareed/FAST-GC
  summary: FAST-GC LiDAR ground classification framework
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - nadeemfareed
